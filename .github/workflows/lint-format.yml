name: Lint & Format Codebase

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:

jobs:
  lint-format-frontend:
    name: Lint & Format Frontend Codebase
    timeout-minutes: 15
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: ./

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Lint Codebase
        run: bunx nx lint frontend

      - name: Format Codebase
        run: bunx nx format:write --projects=frontend

  lint-format-backend:
    name: Lint & Format Backend Codebase
    timeout-minutes: 15
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: ./

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Lint Codebase
        run: bunx nx lint backend

      - name: Format Codebase
        run: bunx nx format:write --projects=backend